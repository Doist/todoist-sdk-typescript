name: CI

on: [pull_request]

jobs:
    ci:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        strategy:
            matrix:
                node-version: [24, 26]
        steps:
            - uses: actions/checkout@v6

            - name: Configure doist package repository
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: npm ci

            - name: Run CI Check
              run: npm run integrity-checks
